# Phases 1-4: planning, implementation, TDD, merge
# MTP and --mmproj cannot be active simultaneously in llama.cpp
#
# parallel = 2: two decode slots so a second devloop Agent Execution Job can
# use the GPU while the first is busy with git/tests/npm install (the agent
# loop is bursty — slots interleave instead of queueing). llama.cpp splits
# ctx-size across slots, so each slot gets 131072 ctx — still ample (sessions
# historically compacted around ~130K), and total KV memory use is unchanged.
# Pairs with temporalWorker.maxConcurrentJobs: 2 in the home-server devloop
# HelmRelease — bump that only after verifying both slots serve correctly:
#   curl -s http://192.168.68.104:8080/props | jq '.total_slots'
# NOTE: verify MTP speculative decoding behaves with >1 slot on the pinned
# llama.cpp build (run two concurrent completions, check /metrics); if it
# misbehaves, drop `parallel` here and keep maxConcurrentJobs at 1.
[qwen3.6-27b-mtp]
model            = /models/unsloth--Qwen3.6-27B-MTP-GGUF/Qwen3.6-27B-UD-Q4_K_XL.gguf
ctx-size         = 262144
n-gpu-layers     = 99
spec-type        = draft-mtp
spec-draft-n-max = 2
parallel         = 2

# Phase 5: QA Validation (browser screenshots, API testing, E2E tracing)
[qwen3.6-27b]
model        = /models/unsloth--Qwen3.6-27B-GGUF/Qwen3.6-27B-UD-Q4_K_XL.gguf
