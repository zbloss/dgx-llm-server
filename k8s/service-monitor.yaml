apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: dgx-vllm
  namespace: ml
  labels:
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - llm-server
  selector:
    matchLabels:
      app.kubernetes.io/name: dgx-vllm
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
