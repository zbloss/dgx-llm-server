apiVersion: v1
kind: Namespace
metadata:
  name: llm-server
---
# Headless service with manually-managed endpoints pointing to the DGX Spark.
# Replace 192.168.X.X with the DGX Spark's actual fixed IP.
apiVersion: v1
kind: Service
metadata:
  name: dgx-llm-server
  namespace: llm-server
spec:
  ports:
    - name: http
      port: 8080
      protocol: TCP
      targetPort: 8080
---
apiVersion: v1
kind: Endpoints
metadata:
  name: dgx-llm-server
  namespace: llm-server
subsets:
  - addresses:
      - ip: "192.168.X.X"
    ports:
      - name: http
        port: 8080
        protocol: TCP
