services:
  llama-server:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /home/zbloss/models:/models:ro
      - ./models/config.ini:/config.ini:ro
    command: >-
      --models-preset /config.ini
      --models-max 1
      --n-gpu-layers -1
      --host 0.0.0.0
      --port 8080
      --flash-attn on
      --jinja
      --metrics
    healthcheck:
      test: ["CMD-SHELL", "STATUS=$$(curl -s -o /dev/null -w '%{http_code}' --max-time 2 -X POST http://localhost:8080/v1/chat/completions -H 'Content-Type: application/json' -d '{\"model\":\"qwen3.6-27b-mtp\",\"messages\":[{\"role\":\"user\",\"content\":\"1\"}],\"max_tokens\":1}' 2>/dev/null || echo timeout); [ \"$$STATUS\" != '500' ] || { kill 1; exit 1; }"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 180s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
