services:
  litellm:
    image: ghcr.io/berriai/litellm:v1.86.0
    restart: unless-stopped
    ports:
      - "8080:4000"
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    command: --config /app/config.yaml
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      LITELLM_SALT_KEY: ${LITELLM_SALT_KEY}
      DATABASE_URL: "postgresql://llmproxy:${LITELLM_DB_PASSWORD}@db:5432/litellm"
      STORE_MODEL_IN_DB: "True"
    depends_on:
      db:
        condition: service_healthy
      vllm-35b:
        condition: service_started
      vllm-27b:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health/liveliness"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  db:
    image: postgres:16
    container_name: litellm_db
    restart: always
    environment:
      POSTGRES_DB: litellm
      POSTGRES_USER: llmproxy
      POSTGRES_PASSWORD: ${LITELLM_DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d litellm -U llmproxy"]
      interval: 1s
      timeout: 5s
      retries: 10

  vllm-35b:
    image: vllm/vllm-openai:v0.21.0
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - /home/zbloss/models:/models:ro
    command: >-
      --model /models/RedHatAI--Qwen3.6-35B-A3B-NVFP4
      --served-model-name qwen3.6-35b-a3b
      --gpu-memory-utilization 0.45
      --max-model-len 262144
      --kv-cache-dtype fp8
      --trust-remote-code
      --host 0.0.0.0
      --port 8000
      --reasoning-parser qwen3
      --tool-call-parser qwen3_coder
      --moe_backend flashinfer_cutlass
      --max-num-seqs 8
    ipc: host
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 300s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  vllm-27b:
    image: vllm/vllm-openai:v0.21.0
    restart: unless-stopped
    depends_on:
      vllm-35b:
        condition: service_healthy
    ports:
      - "8002:8000"
    volumes:
      - /home/zbloss/models:/models:ro
    command: >-
      --model /models/unsloth--Qwen3.6-27B-NVFP4
      --served-model-name qwen3.6-27b
      --gpu-memory-utilization 0.40
      --max-model-len 262144
      --kv-cache-dtype fp8
      --trust-remote-code
      --host 0.0.0.0
      --port 8000
      --max-num-seqs 8
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  postgres_data:
