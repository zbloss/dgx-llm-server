services:
  llm-server:
    image: vllm/vllm-openai:nightly
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - /home/zbloss/models:/models:ro
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
      - HF_HUB_OFFLINE=1
    command: >-
      --model /models/nvidia--Qwen3.6-35B-A3B-NVFP4
      --served-model-name nvidia/Qwen3.6-35B-A3B-NVFP4
      --host 0.0.0.0
      --port 8000
      --tensor-parallel-size 1
      --trust-remote-code
      --kv-cache-dtype fp8
      --attention-backend flashinfer
      --moe-backend marlin
      --gpu-memory-utilization 0.75
      --max-model-len 262144
      --max-num-seqs 8
      --max-num-batched-tokens 16384
      --enable-chunked-prefill
      --enable-prefix-caching
      --load-format fastsafetensors
      --reasoning-parser qwen3
      --tool-call-parser qwen3_xml
      --enable-auto-tool-choice
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/v1/models || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 240s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
