services:
  llama-server:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /home/zbloss/models:/models:ro
      - ./models/config.ini:/config.ini:ro
    command: >-
      --models-preset /config.ini
      --models-max 2
      --n-gpu-layers -1
      --host 0.0.0.0
      --port 8080
      --flash-attn on
      --jinja
      --metrics
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
